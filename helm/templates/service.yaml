
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Values.app_name }}-{{ $.Values.env }}
  labels:
    app: {{ $.Values.app_name }}-{{ $.Values.env }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- range .Values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    app: {{ $.Values.app_name }}-{{ $.Values.env }}
    deployment: {{ $.Values.app_name }}-{{ $.Values.env }}
  internalTrafficPolicy: Cluster