# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
env: "dev"
app_name: "sample-ai-app-backend"

image:
  repository: ""
  tag: "latest"
  pullSecretName: ""

appEnv: {}
  # BACKEND_URL: "http://localhost:8000"
  # APP_TITLE: "Chat Assistant"

replicaCount: 2

autoscaling:
  enabled: true
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70
  minReplicas: 1
  maxReplicas: 2

resources:
  limits:
    cpu: ".5"
    memory: "500Mi"
  requests:
    cpu: ".5"
    memory: "500Mi"    

service:
  type: ClusterIP
  ports:
    - name: 5000-tcp
      protocol: TCP
      port: 5000
      targetPort: 5000
      
ingress:
  hostname: <HOSTNAME>
  path: /
  targetPort: 5000
  certManager:
    enabled: true
    clusterissuer: venafi

livenessProbe:
  enabled: true
  path: /  # Changed from / to dedicated health endpoint
  frequency:
    initialDelaySeconds: 60
    timeoutSeconds: 30  # Increased from 5 to handle load during AI processing
    periodSeconds: 300
    successThreshold: 1
    failureThreshold: 3

readinessProbe:
  enabled: true
  path: /
  frequency:
    initialDelaySeconds: 10
    timeoutSeconds: 10
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
