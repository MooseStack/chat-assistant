# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
env: "dev"
app_name: "sample-ai-app-backend"

image:
  repository: "your-registry.example.com/your-team/sample-ai-app/python-backend"
  tag: "latest"
  pullSecretName: "quay-image-registry-secret"

replicaCount: 1

appEnv:
  LLM_BASE_URL: https://your-llm-endpoint.example.com/v1
  LLM_API_KEY: "not-needed"
  LLM_MODEL: "gemma4-4b"
  SSL_VERIFY: false
  LOG_LEVEL: ERROR
  CORS_ALLOWED_ORIGINS: "*"


autoscaling:
  enabled: true
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70
  minReplicas: 1
  maxReplicas: 2

resources:
  limits:
    cpu: ".5"
    memory: "500Mi"
  requests:
    cpu: ".5"
    memory: "500Mi"    

service:
  type: ClusterIP
  ports:
    - name: 8000-tcp
      protocol: TCP
      port: 8000
      targetPort: 8000
      
ingress:
  hostname: sample-ai-app-backend.apps.your-cluster.example.com
  path: /
  targetPort: 8000
  certManager:
    enabled: true
    clusterissuer: venafi

livenessProbe:
  enabled: true
  path: /health  # Changed from / to dedicated health endpoint
  frequency:
    initialDelaySeconds: 60
    timeoutSeconds: 30  # Increased from 5 to handle load during AI processing
    periodSeconds: 300
    successThreshold: 1
    failureThreshold: 3

readinessProbe:
  enabled: true
  path: /health
  frequency:
    initialDelaySeconds: 10
    timeoutSeconds: 10
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
